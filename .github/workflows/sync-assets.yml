name: Sync Assets from Google Drive

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch:      # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rclone
        run: sudo apt-get install -y rclone

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive.readonly
          service_account_contents = ${{ secrets.GCP_SA_KEY }}
          team_drive = 
          EOF

      - name: Sync from GDrive
        run: |
          # Use your Folder ID here
          rclone sync gdrive:${{ secrets.GDRIVE_FOLDER_ID }} ./assets --vfs-cache-mode full --dry-run
          # Note: Removing --dry-run after you verify it works
          rclone sync gdrive:${{ secrets.GDRIVE_FOLDER_ID }} ./assets

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync assets from Google Drive [skip ci]"
            git push
          fi
