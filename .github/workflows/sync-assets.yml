name: Sync Assets from Google Drive

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch:      # Manual trigger
  repository_dispatch:    # Trigger via Apps Script
    types: [sync_assets]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rclone
        run: sudo apt-get install -y rclone

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp_sa_key.json
          cat <<EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive.readonly
          service_account_file = /tmp/gcp_sa_key.json
          EOF

      - name: Sync from GDrive
        run: |
          rclone sync gdrive: ./assets --drive-root-folder-id ${{ secrets.GDRIVE_FOLDER_ID }}

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync assets from Google Drive [skip ci]"
            git push
          fi
