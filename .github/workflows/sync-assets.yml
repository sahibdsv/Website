name: Sync Assets from Google Drive

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch:      # Manual trigger
  repository_dispatch:    # Trigger via Apps Script
    types: [sync_assets]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp_sa_key.json
          cat <<EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive.readonly
          service_account_file = /tmp/gcp_sa_key.json
          EOF

      - name: Sync from GDrive
        run: |
          rclone sync gdrive: ./assets --drive-root-folder-id ${{ secrets.GDRIVE_FOLDER_ID }}

      - name: Commit and Push
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Auto-sync assets from Google Drive [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Firebase Hosting
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SAHIBDSV_WEBSITE }}'
          channelId: live
          projectId: sahibdsv-website
          target: v2
