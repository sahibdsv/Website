<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Studio V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --sidebar: #0a0a0a;
            --surface-strong: #111111;
            --accent: #ffffff;
            --text: #ffffff;
            --text-muted: #555555;
            --br-ui: 12px;
            --ctrl-height: 2.75rem;
        }

        /* Global Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Jost', sans-serif; scrollbar-width: none; transition: none !important; border: none !important; outline: none !important; }
        ::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            z-index: 10;
            overflow-y: auto;
        }

        /* Controls */
        .control-group { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
        .label-row { display: flex; justify-content: space-between; align-items: center; }
        label { font-size: 0.8rem; font-weight: 700; color: #888; }
        .val { font-size: 0.8rem; font-weight: 700; color: #fff; }

        select, button {
            background-color: var(--accent);
            color: #000;
            border-radius: var(--br-ui);
            padding: 0 1rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            height: var(--ctrl-height);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .home-btn {
            color: var(--text);
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            margin-bottom: 1.5rem;
            display: block;
            text-align: center;
        }

        /* Custom Dropdown Component */
        .custom-dropdown {
            position: relative;
            width: 100%;
        }

        .dropdown-trigger {
            background-color: var(--accent);
            color: #000000;
            border-radius: var(--br-ui);
            padding: 0 1.25rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            height: var(--ctrl-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: left;
            position: relative;
            z-index: 1001;
        }

        .dropdown-trigger.open {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .dropdown-trigger .arrow {
            width: 16px;
            height: 16px;
            transition: transform 0.15s ease-out;
        }

        .dropdown-trigger.open .arrow {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: var(--ctrl-height);
            left: 0;
            width: 100%;
            background-color: var(--accent);
            border-bottom-left-radius: var(--br-ui);
            border-bottom-right-radius: var(--br-ui);
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .dropdown-menu.show {
            display: flex;
        }

        .dropdown-item {
            padding: 0.75rem 1.25rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            text-align: left;
            background: none;
            color: #000000;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: auto;
        }

        .dropdown-item.active {
            background-color: #000000;
            color: #ffffff;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 1.5rem;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: #222; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #fff;
            margin-top: -6px;
        }

        .btn-stack { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }

        .tag-box {
            background-color: var(--surface-strong);
            padding: 1rem;
            font-family: monospace;
            font-size: 0.75rem;
            text-align: center;
            border-radius: var(--br-ui);
            cursor: pointer;
            color: #aaa;
            margin-top: 0.5rem;
            width: 100%;
        }

        /* Main Workspace */
        .main {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-color: var(--bg);
        }

        .viewport {
            width: 100%;
            max-width: 90vh;
            aspect-ratio: 1 / 1;
            background-color: #000;
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #000;
            --progress-bar-color: transparent;
        }

        /* Overlay */
        .overlay-ui {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }
        .overlay-ui.active { opacity: 1; pointer-events: auto; }

        .loader {
            width: 32px;
            height: 32px;
            background-color: var(--accent);
            border-radius: 8px; 
            animation: pulse 1s ease-in-out infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1); opacity: 1; } }

        .log {
            width: 100%;
            max-width: 90vh;
            height: 100px;
            background-color: var(--surface-strong);
            font-family: monospace;
            font-size: 0.75rem;
            padding: 1rem;
            color: #444;
            overflow-y: auto;
            margin-top: 1.5rem;
            border-radius: var(--br-ui);
        }
        
        .hidden { display: none !important; }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

        <div class="sidebar">
            <a href="/" class="home-btn">
                Sahib Virdee
            </a>
            <div class="control-group">
                <div class="custom-dropdown" id="dropdown-container">
                    <button class="dropdown-trigger" id="dropdown-btn">
                        <span id="selected-model-name">Scanning assets...</span>
                        <svg class="arrow" id="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m6 9 6 6 6-6"/>
                        </svg>
                    </button>
                    <div class="dropdown-menu" id="dropdown-list"></div>
                </div>
            </div>

            <div class="control-group">
                <div class="label-row"><label>rx (Pitch)</label><span class="val" id="val-rx">75&deg;</span></div>
                <input type="range" id="sld-rx" min="0" max="180" step="15" value="75">
            </div>

            <div class="control-group">
                <div class="label-row"><label>ry (Yaw)</label><span class="val" id="val-ry">45&deg;</span></div>
                <input type="range" id="sld-ry" min="-360" max="360" step="15" value="45">        
            </div>

            <div class="control-group">
                <div class="label-row"><label>z (Zoom)</label><span class="val" id="val-z">100%</span></div>
                <input type="range" id="sld-z" min="50" max="150" step="1" value="100">
            </div>

            <div class="control-group">
                <div class="label-row"><label>rz (Roll)</label><span class="val" id="val-rz">0&deg;</span></div>
                <input type="range" id="sld-rz" min="-180" max="180" step="15" value="0">
            </div>

            <div class="control-group">
                <div class="label-row"><label>Speed</label><span class="val" id="val-speed">1x</span></div>
                <input type="range" id="sld-speed" min="0" max="3" step="1" value="1">
            </div>

            <div class="control-group">
                <div class="label-row" style="margin-bottom: 0.5rem;"><label>Orient Model (90° Flips)</label></div>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="btn-flip-x" style="flex: 1; height: var(--ctrl-height); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">Flip X</button>
                    <button id="btn-flip-y" style="flex: 1; height: var(--ctrl-height); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">Flip Y</button>
                    <button id="btn-flip-z" style="flex: 1; height: var(--ctrl-height); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">Flip Z</button>
                </div>
            </div>

            <div class="tag-box" id="tags">#rx75 #ry45 #z100 #rz0</div>

        <div class="btn-stack">
            <button id="btn-spin">Preview Spin</button>
            <button id="btn-record">Record Spin</button>
            <button id="btn-toggle-origin">Hide Origin</button>
            <button id="btn-reset">Reset All</button>
        </div>
    </div>

    <div class="main">
        <div class="viewport">
            <model-viewer id="mv" camera-controls interaction-prompt="none" shadow-intensity="0" exposure="0.75" 
                field-of-view="15deg" camera-orbit="45deg 75deg auto" camera-target="0m 0m 0m" interpolation-deceleration-ms="0"
                auto-rotate-delay="0" disable-pan disable-zoom>
                <button slot="hotspot-origin" data-position="0m 0m 0m" style="
                    width: 12px;
                    height: 12px;
                    border-radius: 50%;
                    background-color: #ffffff;
                    border: 2px solid #000000;
                    padding: 0;
                    cursor: default;
                    pointer-events: none;
                    box-shadow: 0 0 0 2px #ffffff;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    position: relative;
                ">
                    <div style="
                        position: absolute;
                        left: 18px;
                        top: 50%;
                        transform: translateY(-50%);
                        background-color: #000000;
                        color: #ffffff;
                        font-family: 'Jost', sans-serif;
                        font-size: 8px;
                        font-weight: 700;
                        padding: 2px 6px;
                        border-radius: 4px;
                        white-space: nowrap;
                        letter-spacing: 0.05em;
                        border: 1px solid #333333;
                    ">ORIGIN</div>
                </button>
            </model-viewer>
            <div class="overlay-ui" id="overlay">
                <div class="loader"></div>
                <div id="status" style="font-size: 0.9rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em;">Working</div>
            </div>
        </div>
        <div class="log" id="log-box">Studio ready.</div>
    </div>

    <script type="module">
        import { 
            MODEL_CONFIG, 
            parseModelCameraOrbit, 
            parseModelOrientation, 
            parseModelFieldOfView,
            applyModelBaseAttributes 
        } from '../../model-engine.js';

        const SPEED_VALUES = [0.3, 1, 2, 3];
        const mv = document.getElementById('mv');
        const state = { rx: 75, ry: 45, z: 100, rz: 0, ox: 0, oy: 0, oz: 0, speed: 1 };
        let isInteracting = false;
        let isSyncing = false;
        let isSpinning = false;
        let selectedModel = '';

        function saveState() {
            const file = selectedModel;
            if (file) localStorage.setItem(`studio-v4-${file}`, JSON.stringify(state));       
        }

        function loadState() {
            const file = selectedModel;
            const saved = localStorage.getItem(`studio-v4-${file}`);
            if (saved) {
                const loaded = JSON.parse(saved);
                if (loaded.s !== undefined && loaded.z === undefined) {
                    loaded.z = loaded.s;
                    delete loaded.s;
                }
                if (loaded.ox === undefined) loaded.ox = 0;
                if (loaded.oy === undefined) loaded.oy = 0;
                if (loaded.oz === undefined) loaded.oz = 0;
                Object.assign(state, loaded);
                render();
            } else {
                Object.assign(state, { rx: 75, ry: 45, z: 100, rz: 0, ox: 0, oy: 0, oz: 0, speed: 1 });
                render();
            }
        }

        function render() {
            if (isSyncing) return;
            isSyncing = true;

            const tags = [`rx${state.rx}`, `ry${state.ry}`, `z${state.z}`];
            if (state.rz !== 0) tags.push(`rz${state.rz}`);
            if (state.ox !== 0) tags.push(`ox${state.ox}`);
            if (state.oy !== 0) tags.push(`oy${state.oy}`);
            if (state.oz !== 0) tags.push(`oz${state.oz}`);

            const orbit = parseModelCameraOrbit(tags);
            const orientation = parseModelOrientation(tags);
            const fov = parseModelFieldOfView(tags);

            mv.cameraOrbit = orbit || MODEL_CONFIG.DEFAULT_ORBIT;
            mv.fieldOfView = fov || MODEL_CONFIG.DEFAULT_FOV;
            if (orientation) {
                mv.setAttribute('orientation', orientation);
            } else {
                mv.setAttribute('orientation', '0deg 0deg 0deg');
            }
            
            if (isSpinning) {
                mv.setAttribute('auto-rotate', '');
                mv.setAttribute('rotation-per-second', `${state.speed * 20}deg`);
            } else {
                mv.removeAttribute('auto-rotate');
                mv.removeAttribute('rotation-per-second');
            }

            Object.keys(state).forEach(k => {
                const el = document.getElementById(`val-${k}`);
                const sld = document.getElementById(`sld-${k}`);
                let suffix = '°';
                if (k === 'z') suffix = '%';
                if (k === 'speed') suffix = 'x';
                if (el) el.textContent = state[k] + suffix;
                if (sld && !isInteracting) {
                    if (k === 'speed') {
                        const idx = SPEED_VALUES.indexOf(state[k]);
                        sld.value = idx !== -1 ? idx : 1;
                    } else {
                        sld.value = state[k];
                    }
                }
            });

            const displayTags = [`rx${state.rx}`, `ry${state.ry}`, `z${state.z}`];
            if (state.rz !== 0) displayTags.push(`rz${state.rz}`);
            if (state.ox !== 0) displayTags.push(`ox${state.ox}`);
            if (state.oy !== 0) displayTags.push(`oy${state.oy}`);
            if (state.oz !== 0) displayTags.push(`oz${state.oz}`);
            document.getElementById('tags').textContent = displayTags.map(t => `#${t}`).join(' ');

            saveState();
            isSyncing = false;
        }

        document.querySelectorAll('input[type="range"]').forEach(sld => {
            const id = sld.id.split('-')[1];
            sld.addEventListener('input', () => { 
                if (id === 'speed') {
                    state[id] = SPEED_VALUES[parseInt(sld.value, 10)];
                } else {
                    state[id] = parseFloat(sld.value);
                }
                render(); 
            });
            sld.addEventListener('mousedown', () => isInteracting = true);
            sld.addEventListener('mouseup', () => isInteracting = false);
            sld.addEventListener('touchstart', () => isInteracting = true, {passive:true});   
            sld.addEventListener('touchend', () => isInteracting = false);
        });

        // Genuine optical FOV zoom driven directly by user scroll gestures
        mv.addEventListener('wheel', (e) => {
            e.preventDefault();
            // Scroll down = zoom out (-), scroll up = zoom in (+)
            const delta = e.deltaY > 0 ? -2 : 2;
            state.z = Math.max(50, Math.min(150, state.z + delta));
            render();
        }, { passive: false });

        // Genuine optical FOV zoom driven directly by two-finger touch pinch gestures
        let initialTouchDistance = null;
        let initialZ = 100;
        
        mv.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialTouchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialZ = state.z;
            }
        }, { passive: true });

        mv.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialTouchDistance !== null) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const factor = dist / initialTouchDistance;
                state.z = Math.max(50, Math.min(150, Math.round(initialZ * factor)));
                render();
            }
        }, { passive: true });

        mv.addEventListener('touchend', () => {
            initialTouchDistance = null;
        });

        mv.addEventListener('camera-change', () => {
            if (isInteracting || isSyncing || isSpinning) return;
            const orbit = mv.getCameraOrbit();
            if (orbit) {
                state.ry = Math.round((orbit.theta * 180 / Math.PI));
                state.rx = Math.round((orbit.phi * 180 / Math.PI));
                render();
            }
        });

        document.getElementById('btn-spin').onclick = () => {
            isSpinning = !isSpinning;
            document.getElementById('btn-spin').textContent = isSpinning ? "Stop Preview" : "Preview Spin";
            render();
        };

        document.getElementById('btn-record').onclick = async () => {
            if (isSpinning) { isSpinning = false; render(); }
            const file = selectedModel;
            const overlay = document.getElementById('overlay');
            overlay.classList.add('active');

            mv.setAttribute('auto-rotate', '');
            mv.setAttribute('rotation-per-second', `${state.speed * 20}deg`);

            const duration = 18 / state.speed; 
            const fps = 30;
            const chunks = [];
            const canvas = mv.shadowRoot.querySelector('canvas');
            const stream = canvas.captureStream(fps);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 2500000 });

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                await fetch('/api/save', { method: 'POST', headers: { 'X-Filename': file.replace('.glb', '.webm') }, body: blob });
                overlay.classList.remove('active');
                render();
            };
            
            recorder.start();
            await new Promise(r => setTimeout(r, duration * 1000));
            recorder.stop();
        };

        async function loadModel(file) {
            selectedModel = file;
            document.getElementById('selected-model-name').textContent = file;
            
            document.querySelectorAll('.dropdown-item').forEach(item => {
                if (item.getAttribute('data-value') === file) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            mv.src = `/assets/${file}`;
            mv.addEventListener('load', () => {
                applyModelBaseAttributes(mv);
                mv.setAttribute('camera-target', '0m 0m 0m');
                loadState();
                render();
            }, { once: true });
        }

        async function refresh() {
            let models = [];
            try {
                const res = await fetch('/api/models');
                if (res.ok) {
                    const contentType = res.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        const data = await res.json();
                        models = data.models || [];
                        document.getElementById('log-box').textContent = "Loaded models from local API.";
                    }
                }
            } catch (e) {
                console.warn("Local API failed, falling back to database.", e);
            }

            if (models.length === 0) {
                try {
                    document.getElementById('log-box').textContent = "Scanning database for models...";
                    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT7HtdJsNwYO8TkB4mem_IKZ-D8xNZ9DTAi-jgxpDM2HScpp9Tlz5DGFuBPd9TuMRwP16vUd-5h47Yz/pub?gid=1470188926&single=true&output=csv';
                    const res = await fetch(CSV_URL);
                    const text = await res.text();
                    
                    // Simple CSV Parse
                    const rows = text.split('\n').map(r => r.split(','));
                    const contentIdx = rows[0].findIndex(h => h.trim() === 'Content');
                    
                    const foundModels = new Set();
                    rows.slice(1).forEach(row => {
                        const content = row[contentIdx] || '';
                        const matches = content.match(/[^\s]+\.glb/g);
                        if (matches) matches.forEach(m => {
                            const name = m.split('/').pop().split('#')[0];
                            foundModels.add(name);
                        });
                    });
                    
                    models = Array.from(foundModels).map(name => ({ name }));
                    document.getElementById('log-box').textContent = `Found ${models.length} models in database. Recording is disabled in cloud.`;
                } catch (e) {
                    console.error("Database fallback failed:", e);
                    document.getElementById('log-box').textContent = "Error: Could not scan assets.";
                }
            }

            const dropdownList = document.getElementById('dropdown-list');
            const dropdownBtn = document.getElementById('dropdown-btn');
            dropdownList.innerHTML = '';

            if (models.length === 0) {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.textContent = "No models found";
                dropdownList.appendChild(item);
                return;
            }

            models.forEach(m => {
                const item = document.createElement('button');
                item.className = 'dropdown-item';
                item.setAttribute('data-value', m.name);
                item.textContent = m.name;
                item.onclick = (e) => {
                    e.stopPropagation();
                    loadModel(m.name);
                    dropdownBtn.classList.remove('open');
                    dropdownList.classList.remove('show');
                };
                dropdownList.appendChild(item);
            });
            loadModel(models[0].name);
        }

        // Custom Dropdown Interactive Behavior
        const dropdownBtn = document.getElementById('dropdown-btn');
        const dropdownList = document.getElementById('dropdown-list');

        dropdownBtn.onclick = (e) => {
            e.stopPropagation();
            const isOpen = dropdownBtn.classList.toggle('open');
            dropdownList.classList.toggle('show', isOpen);
        };

        window.addEventListener('click', (e) => {
            if (!document.getElementById('dropdown-container').contains(e.target)) {
                dropdownBtn.classList.remove('open');
                dropdownList.classList.remove('show');
            }
        });    

        document.getElementById('btn-flip-x').onclick = () => {
            state.ox = (state.ox + 90) % 360;
            render();
        };
        document.getElementById('btn-flip-y').onclick = () => {
            let newRy = state.ry + 90;
            if (newRy > 180) newRy -= 360;
            state.ry = newRy;
            render();
        };
        document.getElementById('btn-flip-z').onclick = () => {
            state.oz = (state.oz + 90) % 360;
            render();
        };

        document.getElementById('btn-reset').onclick = () => {
            Object.assign(state, { rx: 75, ry: 45, z: 100, rz: 0, ox: 0, oy: 0, oz: 0, speed: 1 });
            const marker = document.querySelector('[slot="hotspot-origin"]');
            marker.classList.remove('hidden');
            document.getElementById('btn-toggle-origin').textContent = "Hide Origin";
            render();
        };
        
        document.getElementById('btn-toggle-origin').onclick = () => {
            const marker = document.querySelector('[slot="hotspot-origin"]');
            const isHidden = marker.classList.toggle('hidden');
            document.getElementById('btn-toggle-origin').textContent = isHidden ? "Show Origin" : "Hide Origin";
        };
        
        document.getElementById('tags').onclick = () => navigator.clipboard.writeText(document.getElementById('tags').textContent);

        refresh();
    </script>
</body>
</html>
