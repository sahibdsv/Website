<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahib | Editor</title>
    <link rel="stylesheet" href="/style.css?v=2.08">
    
    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDYwVf54peyQ3J8MeVNlWAFgLDybou1d6Y",
        authDomain: "sahibdsv-website.firebaseapp.com",
        projectId: "sahibdsv-website",
        storageBucket: "sahibdsv-website.firebasestorage.app",
        messagingSenderId: "1015359225714",
        appId: "1:1015359225714:web:bd763877147049a66567eb",
        measurementId: "G-ZVLZZJ4E3C"
      };
      firebase.initializeApp(firebaseConfig);

    <style>
        #editor-ui {
            display: none;
            padding: var(--spacing);
            max-width: 800px;
            margin: 0 auto;
        }

        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: var(--spacing);
        }

        .upload-zone {
            border: 2px dashed var(--support-muted);
            border-radius: var(--br-ui);
            padding: 3rem var(--spacing);
            text-align: center;
            margin-bottom: var(--spacing);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .upload-zone:hover {
            border-color: var(--text);
        }

        #file-input {
            display: none;
        }

        .asset-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: var(--spacing);
            margin-top: 2rem;
        }

        .asset-card {
            background: var(--support-strong);
            border-radius: var(--br-ui);
            overflow: hidden;
            aspect-ratio: 1;
            position: relative;
        }

        .asset-card img, .asset-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--support-muted);
            margin-top: 0.5rem;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .progress-inner {
            height: 100%;
            background: var(--text);
            width: 0%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <header class="header-system">
        <a href="/" id="site-name">Editor</a>
    </header>

    <!-- Auth Screen -->
    <div id="auth-screen">
        <h1 style="margin-bottom: 2rem;">Admin Access</h1>
        <button id="login-btn" class="btn">Login with Google</button>
    </div>

    <!-- Main Editor UI -->
    <div id="editor-ui">
        <div class="block-text">
            <h2>Asset Manager</h2>
            <p>Upload new images, models, or videos to Firebase Storage.</p>
            <p style="font-size: 0.8em; color: var(--support-muted);">Note: Assets are synced to GitHub every 30 minutes via GitHub Actions.</p>
        </div>

        <div class="upload-zone" id="drop-zone">
            <p>Click or drag files here to upload</p>
            <input type="file" id="file-input" multiple>
            <div class="progress-bar" id="master-progress">
                <div class="progress-inner" id="progress-fill"></div>
            </div>
        </div>

        <div class="asset-list" id="asset-preview-list">
            <!-- Uploaded assets will appear here -->
        </div>

        <div style="margin-top: 4rem; text-align: center;">
            <button id="logout-btn" class="link-line">Logout</button>
        </div>
    </div>

    <script>
        const auth = firebase.auth();
        const storage = firebase.storage();
        
        const authScreen = document.getElementById('auth-screen');
        const editorUi = document.getElementById('editor-ui');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const progressFill = document.getElementById('progress-fill');
        const progressBar = document.getElementById('master-progress');

        // Auth Logic
        auth.onAuthStateChanged(user => {
            if (user) {
                // You might want to restrict this to your specific email
                if (user.email === "me@sahibvirdee.com") {
                    authScreen.style.display = 'none';
                    editorUi.style.display = 'block';
                } else {
                    alert("Unauthorized access.");
                    auth.signOut();
                }
            } else {
                authScreen.style.display = 'flex';
                editorUi.style.display = 'none';
            }
        });

        loginBtn.onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        };

        logoutBtn.onclick = () => auth.signOut();

        // Upload Logic
        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(uploadFile);
        };

        function uploadFile(file) {
            const storageRef = storage.ref(`assets/${file.name}`);
            const uploadTask = storageRef.put(file);

            progressBar.style.display = 'block';

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progressFill.style.width = progress + '%';
                }, 
                (error) => {
                    console.error("Upload failed:", error);
                    alert("Upload failed for " + file.name);
                }, 
                () => {
                    console.log("Upload successful:", file.name);
                    progressFill.style.width = '0%';
                    progressBar.style.display = 'none';
                    // Add to local preview list (optional)
                    renderPreview(file);
                }
            );
        }

        function renderPreview(file) {
            const list = document.getElementById('asset-preview-list');
            const card = document.createElement('div');
            card.className = 'asset-card';
            card.innerText = file.name; // Simplified for now
            list.prepend(card);
        }
    </script>
</body>
</html>
