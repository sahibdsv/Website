<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahib | Editor</title>
    <link rel="stylesheet" href="/style.css?v=2.08">
    
    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDYwVf54peyQ3J8MeVNlWAFgLDybou1d6Y",
        authDomain: "sahibdsv-website.firebaseapp.com",
        projectId: "sahibdsv-website",
        storageBucket: "sahibdsv-website.firebasestorage.app",
        messagingSenderId: "1015359225714",
        appId: "1:1015359225714:web:bd763877147049a66567eb",
        measurementId: "G-ZVLZZJ4E3C"
      };
      firebase.initializeApp(firebaseConfig);
    </script>

    <style>
        #editor-ui {
            display: none;
            padding: var(--spacing);
            max-width: 800px;
            margin: 0 auto;
        }

        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: var(--spacing);
        }

        .upload-container {
            margin-bottom: 2rem;
        }

        .upload-zone {
            border: 2px dashed var(--support-muted);
            border-radius: var(--br-ui);
            padding: 4rem var(--spacing);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(var(--text-rgb), 0.02);
        }

        .upload-zone.drag-over {
            border-color: var(--text);
            background: rgba(var(--text-rgb), 0.05);
        }

        #file-input {
            display: none;
        }

        .status-panel {
            margin-top: var(--spacing);
            padding: var(--spacing);
            background: var(--support-strong);
            border-radius: var(--br-ui);
            display: none;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .status-item:last-child { margin-bottom: 0; }

        .status-tag {
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .tag-pending { background: var(--support-muted); color: var(--text); }
        .tag-uploading { background: var(--text); color: var(--bg); }
        .tag-success { background: #2ecc71; color: #fff; }

        .action-bar {
            display: flex;
            gap: var(--spacing);
            margin-top: var(--spacing);
        }

        .asset-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: var(--spacing);
            margin-top: 2rem;
        }

        .asset-card {
            background: var(--support-strong);
            border-radius: var(--br-ui);
            overflow: hidden;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            padding: 0.5rem;
            text-align: center;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <header class="header-system">
        <a href="/" id="site-name">Editor</a>
    </header>

    <!-- Auth Screen -->
    <div id="auth-screen">
        <h1 style="margin-bottom: 2rem;">Admin Access</h1>
        <button id="login-btn" class="btn">Login with Google</button>
    </div>

    <!-- Main Editor UI -->
    <div id="editor-ui">
        <div class="block-text">
            <h2>Asset Manager</h2>
            <p>Drag files to upload. Use the sync button to commit to GitHub immediately.</p>
        </div>

        <div class="upload-container">
            <div class="upload-zone" id="drop-zone">
                <p id="zone-text">Drop files here or click to browse</p>
                <input type="file" id="file-input" multiple>
            </div>

            <div class="status-panel" id="status-panel">
                <div id="status-items"></div>
                <div class="action-bar">
                    <button id="sync-now-btn" class="btn" style="flex: 1;">Commit & Sync to GitHub</button>
                </div>
            </div>
        </div>

        <div class="asset-list" id="asset-preview-list"></div>

        <div style="margin-top: 4rem; text-align: center;">
            <button id="logout-btn" class="link-line">Logout</button>
        </div>
    </div>

    <script>
        const auth = firebase.auth();
        const storage = firebase.storage();
        
        // CONFIG - Replace with your details
        const GITHUB_USER = "sahibdsv";
        const GITHUB_REPO = "Website";
        
        const authScreen = document.getElementById('auth-screen');
        const editorUi = document.getElementById('editor-ui');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const statusPanel = document.getElementById('status-panel');
        const statusItems = document.getElementById('status-items');
        const syncNowBtn = document.getElementById('sync-now-btn');
        const zoneText = document.getElementById('zone-text');

        let currentUser = null;

        // Auth Logic
        auth.onAuthStateChanged(user => {
            if (user && user.email === "me@sahibvirdee.com") {
                currentUser = user;
                authScreen.style.display = 'none';
                editorUi.style.display = 'block';
            } else {
                if (user) auth.signOut();
                authScreen.style.display = 'flex';
                editorUi.style.display = 'none';
            }
        });

        loginBtn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        logoutBtn.onclick = () => auth.signOut();

        // Drag and Drop
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        };
        fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            statusPanel.style.display = 'block';
            Array.from(files).forEach(uploadFile);
        }

        function uploadFile(file) {
            const itemId = 'status-' + Math.random().toString(36).substr(2, 9);
            const itemHtml = `
                <div class="status-item" id="${itemId}">
                    <span>${file.name}</span>
                    <span class="status-tag tag-uploading">Uploading...</span>
                </div>
            `;
            statusItems.insertAdjacentHTML('beforeend', itemHtml);

            const storageRef = storage.ref(`assets/${file.name}`);
            const uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', null, 
                (err) => {
                    document.querySelector(`#${itemId} .status-tag`).className = 'status-tag tag-pending';
                    document.querySelector(`#${itemId} .status-tag`).innerText = 'Failed';
                }, 
                () => {
                    document.querySelector(`#${itemId} .status-tag`).className = 'status-tag tag-success';
                    document.querySelector(`#${itemId} .status-tag`).innerText = 'Ready';
                    renderPreview(file);
                }
            );
        }

        function renderPreview(file) {
            const list = document.getElementById('asset-preview-list');
            const card = document.createElement('div');
            card.className = 'asset-card';
            card.innerText = file.name;
            list.prepend(card);
        }

        syncNowBtn.onclick = async () => {
            syncNowBtn.innerText = "Triggering GitHub Sync...";
            syncNowBtn.disabled = true;

            // This requires a GitHub Personal Access Token with 'repo' scope
            // For security, you should ideally proxy this through an Apps Script
            // or use a Firebase Function. For now, we'll prompt you for the token
            // or you can set up the repository_dispatch.
            
            const token = prompt("Enter your GitHub Personal Access Token (repo scope) to trigger sync:");
            if (!token) {
                syncNowBtn.innerText = "Commit & Sync to GitHub";
                syncNowBtn.disabled = false;
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ event_type: 'sync_assets' })
                });

                if (response.ok) {
                    alert("Sync triggered! Check GitHub Actions tab. Site will update in ~2 mins.");
                } else {
                    throw new Error("Failed to trigger GitHub");
                }
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                syncNowBtn.innerText = "Commit & Sync to GitHub";
                syncNowBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
